<div class="error-page">
  <nb-card class="error-card" status="danger">
    <nb-card-header>
      <nb-icon icon="alert-triangle-outline"></nb-icon>
      <span>{{ 'ERR.PAGE.TITLE' | translate }}</span>
    </nb-card-header>
    <nb-card-body>
      <p class="error-message">{{ i18nKey | translate }}</p>
      <p class="error-code" *ngIf="code">
        <small>{{ code }}</small>
      </p>
      <p class="error-correlation" *ngIf="correlationId">
        <small>{{ 'ERR.MODAL.REFERENCE' | translate }}: {{ correlationId }}</small>
      </p>
    </nb-card-body>
    <nb-card-footer>
      <button nbButton status="basic" (click)="goBack()">
        {{ 'ERR.PAGE.BACK' | translate }}
      </button>
      <button nbButton status="primary" (click)="goHome()">
        {{ 'ERR.PAGE.HOME' | translate }}
      </button>
    </nb-card-footer>
  </nb-card>
</div>
