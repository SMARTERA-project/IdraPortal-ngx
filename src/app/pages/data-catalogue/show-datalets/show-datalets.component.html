<nb-card>
    <nb-card-header>
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <div>Datalets</div>
        <button nbButton status="primary" (click)="close()">{{ 'CLOSE' | translate }}</button>
      </div>
    </nb-card-header>
    <nb-card-body class="d-flex flex-column">
        <nb-select class="mb-2" size="small" placeholder="Select Showcase" [(selected)]="selected">
            @for (datalet of datalets; track $index) {
                <nb-option [value]='datalet'>{{ datalet.title }}</nb-option>
            }
        </nb-select>
       <!-- Datalet HTML is rendered inside a sandboxed iframe (no allow-same-origin):
            any script in the stored markup runs in an opaque origin and cannot reach
            the parent app, its DOM, or the auth token. -->
       @if (selected) {
         <iframe [srcdoc]="selected.datalet_html | safeHtml"
                 sandbox="allow-scripts allow-popups allow-forms"
                 style="width:100%; height:60vh; border:0;"></iframe>
       }
    </nb-card-body>
</nb-card>
