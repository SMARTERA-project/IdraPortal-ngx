<nb-card >
    <nb-card-header>{{ title }}</nb-card-header>
    <nb-card-body >
      <!-- Sandboxed iframe (no allow-same-origin): isolates the datalet markup from the app. -->
      <iframe [srcdoc]="safeDatalet"
              sandbox="allow-scripts allow-popups allow-forms"
              style="width:100%; height:60vh; border:0;"></iframe>
    </nb-card-body>
    <nb-card-footer>
      <div class="button-container">
        <button nbButton status="primary" (click)="dismiss()">{{ 'CLOSE' | translate }}</button>
      </div>
    </nb-card-footer>
  </nb-card>
