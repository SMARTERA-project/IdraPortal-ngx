 server {
        listen 80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html index.htm;
        include /etc/nginx/mime.types;

        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        # --- Security headers (applied to every response) ---
        # Clickjacking protection: only this origin may frame the app.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        # Prevent MIME sniffing.
        add_header X-Content-Type-Options "nosniff" always;
        # Limit referrer leakage.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Honored only over HTTPS (ignored on plain HTTP); safe to send when TLS
        # is terminated upstream.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # NOTE: A full content CSP (script-src/style-src/connect-src/frame-src) is
        # intentionally NOT set here because the API, MQA, Keycloak and i18n hosts
        # are configured per-deployment via PORTAL_* env vars (assets/env.js,
        # generated at container startup). To harden further,
        # add a CSP that allow-lists those origins (and docs.google.com + the
        # datalet host for frame-src) once the deployment endpoints are known.

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
